name: Build Landall IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # 使用较新的 macOS 环境
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # 强制更新并安装依赖
          pod install --repo-update

      - name: Configure WebApp
        run: |
          # 修正网址：你的 landall.cn 地址
          sed -i '' 's|https://khmyznikov.com/ios-pwa-shell/|https://www.landall.cn/|g' pwa-shell/Settings.swift
          # 修正 App 名称
          sed -i '' 's/PWAShell/Landall/g' pwa-shell/Info.plist

      - name: Clean and Archive
        run: |
          # 核心修复：强制禁止所有签名行为，针对巨魔用户
          xcodebuild clean archive \
            -workspace pwa-shell.xcworkspace \
            -scheme pwa-shell \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/pwa-shell.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Generate IPA
        run: |
          # 手动构造 Payload 文件夹
          mkdir -p Payload
          cp -r build/pwa-shell.xcarchive/Products/Applications/*.app Payload/
          zip -r Landall_Troll.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Landall-IPA
          path: Landall_Troll.ipa
