name: Build IPA for Landall

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CocoaPods
        run: |
          pod install

      - name: Set App URL and Name
        run: |
          # 1. 修正网址 (增加容错，匹配更多可能的写法)
          sed -i '' 's|https://khmyznikov.com/ios-pwa-shell/|https://www.landall.cn/|g' pwa-shell/Settings.swift
          
          # 2. 暂时使用英文名以确保编译通过
          sed -i '' 's/PWAShell/Landall/g' pwa-shell/Info.plist

      - name: Build Archive
        run: |
          # 核心修复：显式指定 destination 并执行 clean
          xcodebuild -workspace pwa-shell.xcworkspace \
            -scheme pwa-shell \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $PWD/build/pwa-shell.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean archive

      - name: Prepare IPA
        run: |
          mkdir -p Payload
          # 使用更通用的路径匹配
          find build/pwa-shell.xcarchive/Products/Applications -name "*.app" -exec cp -r {} Payload/ \;
          zip -r Landall_v1.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Landall-IPA-Package
          path: Landall_v1.ipa
