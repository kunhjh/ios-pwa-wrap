name: Build IPA for Landall

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 更新到 v4

      - name: Install CocoaPods
        run: pod install

      - name: Set App URL and Name
        run: |
          # 1. 修改网址为蓝代论坛地址
          sed -i '' 's|https://khmyznikov.com/ios-pwa-shell/|https://www.landall.cn/|g' pwa-shell/Settings.swift
          
          # 2. 修改 App 显示名称为“蓝代”
          sed -i '' 's/PWAShell/蓝代/g' pwa-shell/Info.plist

      - name: Build Archive
        run: |
          xcodebuild -workspace pwa-shell.xcworkspace \
            -scheme pwa-shell \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/pwa-shell.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Prepare IPA
        run: |
          mkdir -p Payload
          cp -r build/pwa-shell.xcarchive/Products/Applications/pwa-shell.app Payload/
          zip -r Landall_v1.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4  # 核心修正：更新到 v4 以符合 GitHub 最新要求
        with:
          name: Landall-IPA-Package
          path: Landall_v1.ipa
